<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#0B0B0D"/>
  <!-- Server chassis -->
  <rect x="10" y="14" width="44" height="36" rx="4" fill="#1A1A1A" stroke="#FDBA00" stroke-width="1.5"/>
  <!-- Gold accent stripe top of chassis -->
  <rect x="10" y="14" width="44" height="3" rx="2" fill="#FDBA00"/>
  <!-- Server unit 1 -->
  <rect x="14" y="19" width="36" height="9" rx="2" fill="#242424"/>
  <circle cx="20" cy="23.5" r="2.2" fill="#FDBA00"/>
  <rect x="26" y="22" width="14" height="3" rx="1.5" fill="#333"/>
  <rect x="44" y="21" width="3" height="5" rx="1" fill="#22C55E"/>
  <!-- Server unit 2 -->
  <rect x="14" y="30" width="36" height="9" rx="2" fill="#242424"/>
  <circle cx="20" cy="34.5" r="2.2" fill="#FDBA00" opacity="0.6"/>
  <rect x="26" y="33" width="14" height="3" rx="1.5" fill="#2E2E2E"/>
  <rect x="44" y="32" width="3" height="5" rx="1" fill="#FDBA00"/>
  <!-- Server unit 3 -->
  <rect x="14" y="41" width="36" height="6" rx="2" fill="#1E1E1E"/>
  <rect x="18" y="43" width="20" height="2" rx="1" fill="#2A2A2A"/>
  <rect x="44" y="42" width="3" height="4" rx="1" fill="#EF4444"/>
  <!-- Base / rack feet -->
  <rect x="16" y="50" width="6" height="3" rx="1" fill="#FDBA00" opacity="0.5"/>
  <rect x="42" y="50" width="6" height="3" rx="1" fill="#FDBA00" opacity="0.5"/>
</svg>
