<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- Icon: stylized V/pentagon shape with speed lines -->
  <g transform="translate(8, 8)">
    <!-- Speed lines -->
    <line x1="0" y1="28" x2="28" y2="28" stroke="#FFC107" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="4" y1="36" x2="30" y2="36" stroke="#FFC107" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="8" y1="44" x2="32" y2="44" stroke="#FFC107" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="12" y1="52" x2="34" y2="52" stroke="#FFC107" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
    <line x1="16" y1="60" x2="36" y2="60" stroke="#FFC107" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="12" y1="68" x2="34" y2="68" stroke="#FFC107" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
    <line x1="8" y1="76" x2="32" y2="76" stroke="#FFC107" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <!-- V pentagon shape -->
    <path d="M44 12 L80 12 L96 44 L62 92 L28 44 Z" stroke="#FFC107" stroke-width="5" fill="none" stroke-linejoin="round"/>
    <!-- Inner V -->
    <path d="M52 28 L72 28 L62 72 Z" fill="#FFC107" opacity="0.9"/>
  </g>
  <!-- VIRALIZA text -->
  <text x="120" y="78" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#FFC107" letter-spacing="2">VIRALIZA</text>
  <!-- HOST subtext -->
  <text x="122" y="100" font-family="Arial, sans-serif" font-weight="400" font-size="18" fill="#ffffff" letter-spacing="8" opacity="0.8">HOST</text>
</svg>
